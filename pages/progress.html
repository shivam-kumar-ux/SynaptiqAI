<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Progress - SYNAPTIQ</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--void:#050B18;--navy:#0A1628;--panel:#0D2137;--neon:#00F5FF;--plasma:#7B2FFF;--laser:#FF2D78;--green:#00FF9D;--amber:#FFB300;--silver:#C8D8E8;--dim:#6B8299;--border:#1A3A55}
body{background:var(--void);color:var(--silver);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,245,255,0.02) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,245,255,0.02) 40px);pointer-events:none;z-index:0}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:240px;background:rgba(10,22,40,0.98);border-right:1px solid var(--border);z-index:50;padding:20px 0;display:flex;flex-direction:column}
.sb-logo{padding:0 20px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;font-family:'Orbitron',monospace;font-size:.82rem;font-weight:900;color:var(--neon);letter-spacing:2px}
.sb-logo img{width:34px;height:34px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(0,245,255,0.35))}
nav{flex:1;padding:16px 0}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;font-size:.85rem;color:var(--dim);transition:.2s;text-decoration:none;position:relative}
.nav-item:hover{color:var(--silver);background:rgba(0,245,255,0.04)}
.nav-item.active{color:var(--neon);background:rgba(0,245,255,0.07)}
.nav-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--neon)}
.main{margin-left:240px;flex:1;padding:28px;position:relative;z-index:1}
.page-title{font-family:'Orbitron',monospace;font-size:1.1rem;color:var(--neon);letter-spacing:2px;margin-bottom:28px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.card{background:rgba(10,22,40,0.85);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:10px;padding:22px}
.card-title{font-family:'Orbitron',monospace;font-size:.7rem;letter-spacing:2px;color:var(--dim);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:3px;height:14px;background:var(--neon);border-radius:2px}
.stat-card{text-align:center}
.stat-val{font-family:'Orbitron',monospace;font-size:1.8rem;color:var(--neon)}
.stat-label{font-size:.75rem;color:var(--dim);margin-top:4px;letter-spacing:.5px}
/* streak calendar */
.streak-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.streak-day{aspect-ratio:1;border-radius:3px;background:var(--panel)}
.streak-day.active{background:var(--neon);box-shadow:0 0 6px rgba(0,245,255,0.4)}
.streak-day.today{outline:2px solid var(--plasma);outline-offset:1px}
/* progress bars */
.prog-item{margin-bottom:14px}
.prog-head{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:6px}
.prog-pct{font-family:'JetBrains Mono',monospace;color:var(--neon);font-size:.8rem}
.bar-bg{background:var(--panel);border-radius:99px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--neon),var(--plasma));box-shadow:0 0 8px rgba(0,245,255,0.35);transition:width 1s ease}
/* chart */
canvas{max-height:220px}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sb-logo"><img src="../img/synaptiq_logo_removebg.png" alt="SYNAPTIQ logo"><span>SYNAPTIQ</span></div>
  <nav>
    <a href="dashboard.html" class="nav-item"><span>◉</span> Dashboard</a>
    <a href="plan-new.html" class="nav-item"><span>✦</span> New Plan</a>
    <a href="session.html" class="nav-item"><span>⏱</span> Study Now</a>
    <a href="progress.html" class="nav-item active"><span>▣</span> Progress</a>
    <a href="assessment.html" class="nav-item"><span>⬡</span> Assessment</a>
    <a href="settings.html" class="nav-item"><span>⚙</span> Settings</a>
  </nav>
</div>
<div class="main">
  <div class="page-title">PROGRESS ANALYTICS</div>

  <!-- Stats row -->
  <div class="grid3">
    <div class="card stat-card"><div class="stat-val" id="totalHours">0h</div><div class="stat-label">TOTAL HOURS STUDIED</div></div>
    <div class="card stat-card"><div class="stat-val" id="totalSessions">0</div><div class="stat-label">STUDY SESSIONS</div></div>
    <div class="card stat-card"><div class="stat-val" id="quizAvg">—%</div><div class="stat-label">QUIZ AVERAGE</div></div>
  </div>

  <div class="grid2">
    <!-- Hours chart -->
    <div class="card">
      <div class="card-title">WEEKLY STUDY HOURS</div>
      <canvas id="hoursChart"></canvas>
    </div>
    <!-- Quiz scores chart -->
    <div class="card">
      <div class="card-title">QUIZ SCORE TREND</div>
      <canvas id="quizChart"></canvas>
    </div>
  </div>

  <div class="grid2">
    <!-- Study streak -->
    <div class="card">
      <div class="card-title">30-DAY STREAK CALENDAR</div>
      <div class="streak-grid" id="streakGrid"></div>
      <div style="margin-top:12px;font-size:.8rem;color:var(--dim)">
        <span style="display:inline-block;width:10px;height:10px;background:var(--neon);border-radius:2px;margin-right:6px"></span>Studied
        <span style="display:inline-block;width:10px;height:10px;background:var(--panel);border-radius:2px;margin:0 6px 0 16px"></span>No session
      </div>
    </div>
    <!-- Syllabus progress -->
    <div class="card">
      <div class="card-title">SYLLABUS PROGRESS</div>
      <div id="syllabusProgress">
        <div style="color:var(--dim);font-size:.85rem">No active plans yet. <a href="plan-new.html" style="color:var(--neon)">Create one →</a></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { checkAuthState } from "../js/auth.js";
import { getUserPlans, getSessionsForPlan, getQuizHistory } from "../js/storage.js";

checkAuthState(async (user) => {
  const [plansRes, quizRes] = await Promise.all([
    getUserPlans(user.uid),
    getQuizHistory(user.uid, 14)
  ]);

  // ── Sessions & Hours ──────────────────────────────────
  let allSessions = [];
  if (plansRes.success && plansRes.data.length > 0) {
    const plan = plansRes.data[0];
    const sessRes = await getSessionsForPlan(plan.id);
    if (sessRes.success) allSessions = sessRes.data;
    renderSyllabusProgress(plansRes.data);
  }
  const totalMins = allSessions.reduce((a, s) => a + (s.actualMinutes || 0), 0);
  document.getElementById('totalHours').textContent = Math.round(totalMins / 60 * 10) / 10 + 'h';
  document.getElementById('totalSessions').textContent = allSessions.length;

  // ── Quiz average ──────────────────────────────────────
  const quizzes = quizRes.success ? quizRes.data : [];
  if (quizzes.length) {
    const avg = Math.round(quizzes.reduce((a, q) => a + (q.percentage || 0), 0) / quizzes.length);
    document.getElementById('quizAvg').textContent = avg + '%';
  }

  // ── Weekly hours chart ────────────────────────────────
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const weekHours = new Array(7).fill(0);
  const now = new Date();
  allSessions.forEach(s => {
    const d = new Date(s.createdAt?.toDate ? s.createdAt.toDate() : s.endTime);
    const dayDiff = Math.floor((now - d) / 86400000);
    if (dayDiff < 7) weekHours[(d.getDay() + 6) % 7] += (s.actualMinutes || 0) / 60;
  });
  new Chart(document.getElementById('hoursChart'), {
    type: 'bar',
    data: { labels: days, datasets: [{ data: weekHours.map(h => Math.round(h * 10) / 10), backgroundColor: 'rgba(0,245,255,0.2)', borderColor: '#00F5FF', borderWidth: 2, borderRadius: 4 }] },
    options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#6B8299', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: 'rgba(26,58,85,0.5)' } }, y: { ticks: { color: '#6B8299', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: 'rgba(26,58,85,0.5)' } } }, responsive: true }
  });

  // ── Quiz trend chart ──────────────────────────────────
  const quizLabels = quizzes.slice(0,7).reverse().map((_, i) => 'Q' + (i+1));
  const quizScores = quizzes.slice(0,7).reverse().map(q => q.percentage || 0);
  new Chart(document.getElementById('quizChart'), {
    type: 'line',
    data: { labels: quizLabels, datasets: [{ data: quizScores, borderColor: '#7B2FFF', backgroundColor: 'rgba(123,47,255,0.1)', borderWidth: 2, pointBackgroundColor: '#7B2FFF', tension: 0.4, fill: true }] },
    options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: '#6B8299', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: 'rgba(26,58,85,0.5)' } }, y: { min: 0, max: 100, ticks: { color: '#6B8299', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: 'rgba(26,58,85,0.5)' } } }, responsive: true }
  });

  // ── Streak calendar ───────────────────────────────────
  const grid = document.getElementById('streakGrid');
  const studiedDays = new Set(allSessions.map(s => {
    const d = s.createdAt?.toDate ? s.createdAt.toDate() : new Date(s.endTime);
    return d.toDateString();
  }));
  for (let i = 29; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const cell = document.createElement('div');
    cell.className = 'streak-day' + (studiedDays.has(d.toDateString()) ? ' active' : '') + (i === 0 ? ' today' : '');
    cell.title = d.toLocaleDateString();
    grid.appendChild(cell);
  }
}, () => window.location.href = 'login.html');

function renderSyllabusProgress(plans) {
  const wrap = document.getElementById('syllabusProgress');
  if (!plans.length) return;
  wrap.innerHTML = plans.slice(0,4).map(p => {
    const activePlan = p.studyPlan || p.mergedPlan || p.geminiPlan;
    const total = activePlan?.days?.reduce((a, d) => a + (d.topics?.length || 0), 0) || 0;
    const pct = 0; // TODO: calculate from completed topics
    return `<div class="prog-item">
      <div class="prog-head"><span>${p.subject}</span><span class="prog-pct">${pct}%</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}
</script>
</body>
</html>
